<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Lineage 3.8 登入器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!--
  天堂 3.8 登入器 — Default Skin
  =================================
  使用者可複製整個 skins/default/ 資料夾改名為新 skin（例如 skins/myskin/），
  然後修改本檔的 HTML 結構與 style.css 的樣式。背景圖請替換 bg.jpg。

  流程：
    1. 開啟登入器 → 顯示「自動更新 / Press Start」頁
    2. 使用者點「開始」→ 切到「選擇伺服器」頁
    3. 點伺服器列 → 啟動遊戲（雙擊或先點選再按「登入」）
-->
<div class="window">
  <!-- 背景圖層（兩個 view 共用） -->
  <div class="bg-image"></div>
  <div class="bg-vignette"></div>

  <!-- ════════════ View 1：自動更新 / Press Start（首頁） ════════════ -->
  <div class="view view-progress" id="viewProgress">
    <!-- 上方 tab 列（可拖曳）。官網/客服連結 URL 由 config.ini 設定，空字串會被 JS 隱藏。 -->
    <div class="topbar drag-region">
      <span class="tab-link no-drag" id="topbarOfficial" data-action="open-link" data-key="official">官網</span>
      <span class="tab-link no-drag" id="topbarSupport" data-action="open-link" data-key="support">客服</span>
      <span class="spacer"></span>
      <span class="title-close no-drag" data-action="cancel">✕</span>
    </div>

    <!-- Lineage logo 塊（可拖曳） -->
    <div class="logo-plate drag-region">
      <div class="wordmark">Lineage</div>
    </div>

    <!-- 公告網頁（由 config.ini [launcher] announcement_url 提供，未設定時 iframe 隱藏）-->
    <iframe class="announcement-frame" id="announcementFrame"
            sandbox="allow-scripts allow-popups allow-same-origin"
            referrerpolicy="no-referrer"></iframe>

    <!-- 進度面板 -->
    <div class="progress-panel">
      <div class="progress-header">
        <span class="game-update-label">天堂遊戲更新</span>
        <span class="press-start">Press Start' to play The Game.</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">目前進度</span>
        <div class="progress-bar">
          <div class="progress-fill blue" id="progressCurrent" style="width: 0%"></div>
        </div>
      </div>
      <div class="progress-row">
        <span class="progress-label">總 進 度</span>
        <div class="progress-bar">
          <div class="progress-fill red" id="progressTotal" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- 開始 / 取消 按鈕 -->
    <div class="action-column">
      <div class="btn-small btn-primary" data-action="goto-select">
        <div class="btn-zh">開始</div>
        <div class="btn-en">Start</div>
      </div>
      <div class="btn-small btn-cancel" data-action="cancel">
        <div class="btn-zh">取消</div>
        <div class="btn-en">Cancel</div>
      </div>
    </div>
  </div>

  <!-- ════════════ View 2：選擇伺服器 ════════════ -->
  <div class="view view-select hidden" id="viewSelect">
    <!-- 標題列（可拖曳） -->
    <div class="titlebar drag-region">
      <span class="title-close no-drag" data-action="cancel">✕</span>
    </div>

    <!-- 「選擇伺服器」浮動標題板（可拖曳） -->
    <div class="header-plate drag-region">
      <span>選擇伺服器</span>
    </div>

    <!-- 伺服器清單 -->
    <div class="server-list" id="serverList">
      <!-- 由 launcher.js 動態填入；雙擊任一列即可啟動 -->
    </div>

    <!-- 下方面板 -->
    <div class="panel-bottom">
      <label class="checkbox-windowed">
        <span class="cb-box" id="cbWindowedBox">✓</span>
        <span>視窗化</span>
      </label>

      <label class="resolution-pick">
        <span>解析度</span>
        <select id="resolutionSelect">
          <option value="5">800×600</option>
          <option value="6">1200×900</option>
          <option value="7">1600×1200</option>
        </select>
      </label>

      <div class="btn btn-primary" data-action="launch">登入</div>
      <div class="btn btn-cancel" data-action="back">取消</div>

      <span class="version-label" id="versionLabel">0.1.0</span>
    </div>
  </div>
</div>

<script src="launcher.js"></script>
</body>
</html>
